<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#070706">
<title>Member Inbox — The Aurum Century Club</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23070706'/><rect x='4' y='4' width='24' height='24' fill='none' stroke='%23C5A572' stroke-width='1'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='14' font-style='italic' fill='%23C5A572'>Au</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@400&family=DM+Sans:wght@400;500&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/tokens.css">
<style>

.page-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  background: rgba(7,7,6,0.92);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.member-badge {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  color: var(--goldA);
  border: 1px solid var(--goldBorderS);
  padding: 5px 12px;
}

.page-content {
  max-width: 800px;
  margin: 0 auto;
  padding: 120px 32px 100px;
}

@media (max-width: 768px) {
  .page-content { padding: 100px 20px 80px; }
  .page-nav { padding: 16px 20px; }
}

.page-header { margin-bottom: 48px; }

.page-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.28em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.page-title {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: clamp(32px, 5vw, 52px);
  letter-spacing: 0.04em;
  line-height: 1.1;
}

/* ─── Loading skeleton ──────────────────────────────────────────────── */
@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}

.msg-skeleton {
  height: 60px;
  background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.04) 50%, var(--surface) 75%);
  background-size: 800px 100%;
  animation: shimmer 1.4s ease-in-out infinite;
  border: 1px solid var(--border);
  margin-bottom: 8px;
}
@media (prefers-reduced-motion: reduce) {
  .msg-skeleton { animation: none; }
}

/* Error state — soft, with retry */
.msg-error {
  padding: 36px 28px;
  text-align: center;
  border: 1px solid var(--redBd);
  background: rgba(176,94,86,0.04);
  margin: 12px 0;
}
.msg-error-title {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text);
  margin-bottom: 8px;
}
.msg-error-hint {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.msg-error-retry {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--goldA);
  background: transparent;
  border: 1px solid var(--goldBorderS);
  padding: 9px 18px;
  cursor: pointer;
  transition: background var(--dur-fast) ease;
}
.msg-error-retry:hover { background: var(--goldMuted); }

/* ─── Message cards ─────────────────────────────────────────────────── */
.msg-empty {
  padding: 80px 0;
  text-align: center;
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--dim);
}

.msg-card {
  border-left: 3px solid;
  border-top: 1px solid;
  border-right: 1px solid;
  border-bottom: 1px solid;
  background: var(--surface);
  margin-bottom: 8px;
  transition: background var(--dur-fast) ease;
  cursor: pointer;
}

.msg-card.unread { background: rgba(17,17,16,0.9); }
.msg-card:hover  { background: rgba(20,20,18,0.9); }

.msg-card.gold  { border-color: var(--goldBorderS); border-left-color: var(--goldA); }
.msg-card.blue  { border-color: var(--blueBd); border-left-color: var(--blue); }
.msg-card.amber { border-color: var(--amberBd); border-left-color: var(--amber); }

.msg-card.unread.gold  { border-color: var(--goldBorderM); }
.msg-card.unread.blue  { border-color: rgba(91,133,184,0.6); }
.msg-card.unread.amber { border-color: rgba(184,131,58,0.6); }

.msg-header {
  display: flex;
  align-items: center;
  padding: 18px 24px;
  gap: 14px;
}

.msg-unread-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--goldA);
  flex-shrink: 0;
  display: none;
}

.msg-card.unread .msg-unread-dot { display: block; }

.msg-subject {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text);
  flex: 1;
}

.msg-card.unread .msg-subject {
  font-weight: 400;
  color: var(--text);
}

.msg-date {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  color: var(--dim);
  text-transform: uppercase;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.msg-body {
  display: none;
  padding: 0 24px 24px;
  border-top: 1px solid var(--border);
  margin-top: 0;
}

.msg-card.expanded .msg-body {
  display: block;
  animation: msgIn 180ms var(--ease-entrance) both;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-body-text {
  font-family: var(--font-display);
  font-size: 17px;
  line-height: 1.85;
  color: rgba(237,232,223,0.80);
  margin: 20px 0 20px;
}

.msg-reply-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-transform: uppercase;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: color var(--dur-fast) ease, border-color var(--dur-fast) ease;
}

.msg-reply-link:hover { color: var(--goldA); border-bottom-color: var(--goldBorderS); }

/* ─── Mobile bottom nav ─────────────────────────────────────────────── */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--near);
  border-top: 1px solid var(--border);
  padding: 10px 24px max(10px, env(safe-area-inset-bottom));
  justify-content: space-around;
  align-items: center;
  height: 56px;
}

.mobile-nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  text-decoration: none;
  color: var(--muted);
  transition: color 180ms ease;
  min-width: 48px;
}

.mobile-nav-item.active { color: var(--goldA); }
.mobile-nav-icon { font-size: 18px; line-height: 1; }
.mobile-nav-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border-bottom: 1px solid transparent;
}

.mobile-nav-item.active .mobile-nav-label { border-bottom-color: var(--goldA); }

@media (max-width: 768px) {
  .mobile-nav { display: flex; }
  .page-content { padding-bottom: 120px; }
}

/* ─── Bilingual ────────────────────────────────────────────────────── */
[data-lang]{display:none}
.lang-en [data-lang="en"],.lang-en [data-lang="en"].block{display:inline}.lang-en [data-lang="en"].block{display:block}
.lang-ko [data-lang="ko"],.lang-ko [data-lang="ko"].block{display:inline}.lang-ko [data-lang="ko"].block{display:block}

/* ─── Mobile breakpoints ───────────────────────────────────────────── */
@media (max-width: 430px) {
  .page-nav { padding: 14px 16px; }
  .member-badge { font-size: 10px; padding: 4px 8px; }
  .page-content { padding: 90px 16px 120px; }
}

@media (max-width: 375px) {
  .page-content { padding: 86px 14px 120px; }
  .msg-header { padding: 14px 16px; gap: 10px; }
  .msg-subject { font-size: 16px; }
  .msg-body { padding: 0 16px 18px; }
  .msg-date { font-size: 8px; }
  .mobile-nav { padding: 8px 16px max(8px, env(safe-area-inset-bottom)); }
  .mobile-nav-item { min-width: 44px; }
}
@media (max-width: 320px) {
  .page-nav { padding: 12px 12px; }
  .member-badge { font-size: 9px; padding: 3px 6px; letter-spacing: 0.08em; }
  .page-content { padding: 80px 12px 120px; }
  .msg-subject { font-size: 15px; }
}
</style>
</head>
<body>

<div class="page-veil" id="page-veil"></div>

<nav class="page-nav" role="navigation">
  <a href="/portfolio" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
    <div class="seal"><em>Au</em></div>
    <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;"><span data-lang="en">Messages</span><span data-lang="ko">메시지</span></span>
  </a>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ko')">한국어</button>
    <span class="member-badge" id="member-badge">#—</span>
  </div>
</nav>

<main class="page-content">

  <header class="page-header" data-reveal>
    <p class="page-eyebrow">Member Communications</p>
    <h1 class="page-title">Member <em class="gold-gradient">Inbox</em></h1>
  </header>

  <!-- Loading skeletons -->
  <div id="loading-state">
    <div class="msg-skeleton"></div>
    <div class="msg-skeleton"></div>
    <div class="msg-skeleton"></div>
  </div>

  <!-- Messages container -->
  <div id="messages-container" style="display:none;">
    <div id="msg-empty" class="msg-empty">
      <div style="font-family:var(--font-display);font-size:22px;color:var(--muted);margin-bottom:10px;">No correspondence yet</div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;color:var(--dim);text-transform:uppercase;">Quarterly letters and partner notes will arrive here</div>
    </div>
  </div>

  <!-- Error state -->
  <div id="error-state" class="msg-error" style="display:none;">
    <div class="msg-error-title">Couldn't load messages</div>
    <div class="msg-error-hint">Network or server unavailable</div>
    <button class="msg-error-retry" id="msg-retry">Retry</button>
  </div>

</main>

<!-- Mobile bottom nav -->
<nav class="mobile-nav" aria-label="Mobile navigation">
  <a href="/portfolio" class="mobile-nav-item">
    <span class="mobile-nav-icon">⌂</span>
    <span class="mobile-nav-label"><span data-lang="en">Overview</span><span data-lang="ko">개요</span></span>
  </a>
  <a href="/gold" class="mobile-nav-item">
    <span class="mobile-nav-icon">◈</span>
    <span class="mobile-nav-label"><span data-lang="en">Gold</span><span data-lang="ko">금</span></span>
  </a>
  <a href="/documents" class="mobile-nav-item">
    <span class="mobile-nav-icon">⊟</span>
    <span class="mobile-nav-label"><span data-lang="en">Documents</span><span data-lang="ko">문서</span></span>
  </a>
  <a href="/messages" class="mobile-nav-item active">
    <span class="mobile-nav-icon">✉</span>
    <span class="mobile-nav-label"><span data-lang="en">Messages</span><span data-lang="ko">메시지</span></span>
  </a>
</nav>

<script src="/_scripts/shared.js"></script>
<script>
(function () {
  'use strict';

  function loadMessages() {
    document.getElementById('loading-state').style.display = 'block';
    document.getElementById('messages-container').style.display = 'none';
    document.getElementById('error-state').style.display = 'none';
    fetch('/api/v2?resource=member&op=me', { credentials: 'same-origin' })
    .then(function (r) {
      if (!r.ok) throw new Error('http ' + r.status);
      return r.json();
    })
    .then(function (d) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('messages-container').style.display = 'block';

      var badge = document.getElementById('member-badge');
      if (badge && d.member_number) badge.textContent = '#' + d.member_number;

      var raw = d.messages || [];
      var msgs = Array.isArray(raw) ? raw : (raw.items || []);

      // Clear any previously rendered cards (retry case) — keep the empty placeholder.
      var container = document.getElementById('messages-container');
      Array.prototype.slice.call(container.querySelectorAll('.msg-card')).forEach(function (n) { n.remove(); });

      var emptyEl = document.getElementById('msg-empty');
      if (!msgs.length) { emptyEl.style.display = 'block'; return; }
      emptyEl.style.display = 'none';

      msgs.forEach(function (m) {
        var card = document.createElement('div');
        var typeClass = m.type || 'gold';
        var isRead = !!(m.read || m.read_at);
        card.className = 'msg-card ' + typeClass + (isRead ? '' : ' unread');

        var sentAt = m.sent_at || m.date;
        var dateLabel = sentAt
          ? (typeof sentAt === 'string' && sentAt.length <= 12 ? sentAt : TACC.fmDate(sentAt, window._lang))
          : '—';
        var fromLabel = m.from_label || (m.from === 'system' ? 'System' : 'TKJ · Partner');

        card.innerHTML =
          '<div class="msg-header">' +
            '<div class="msg-unread-dot" aria-label="Unread"></div>' +
            '<div class="msg-subject">' + escHtml(m.subject || '—') + '</div>' +
            '<div class="msg-date">' + escHtml(dateLabel) + '</div>' +
          '</div>' +
          '<div class="msg-body">' +
            '<div style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;margin-top:14px;">From: ' + escHtml(fromLabel) + '</div>' +
            '<p class="msg-body-text">' + (m.body || '') + '</p>' +
            '<a class="msg-reply-link" href="mailto:members@theaurumcc.com?subject=Re: ' + encodeURIComponent(m.subject || '') + '">↩ &nbsp;Reply by email</a>' +
          '</div>';

        card.querySelector('.msg-header').addEventListener('click', function () {
          var wasUnread = card.classList.contains('unread');
          card.classList.toggle('expanded');
          if (wasUnread && card.classList.contains('expanded')) {
            card.classList.remove('unread');
            var dot = card.querySelector('.msg-unread-dot');
            if (dot) dot.style.display = 'none';
            if (m.id) {
              fetch('/api/v2?resource=member&op=ack-message', {
                method: 'POST',
                credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message_id: m.id })
              }).catch(function () {});
            }
          }
        });

        container.appendChild(card);
      });

      function escHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }
    })
    .catch(function () {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('messages-container').style.display = 'none';
      document.getElementById('error-state').style.display = 'block';
    });
  }
  document.getElementById('msg-retry').addEventListener('click', loadMessages);
  loadMessages();
}());
</script>
</body>
</html>

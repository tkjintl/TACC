<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#070706">
<title>Fund Positions — The Aurum Century Club</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23070706'/><rect x='4' y='4' width='24' height='24' fill='none' stroke='%23C5A572' stroke-width='1'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='14' font-style='italic' fill='%23C5A572'>Au</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@400&family=DM+Sans:wght@400;500&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/_styles/tokens.css">
<style>

/* ─── Skeleton shimmer ─────────────────────────────────────────────── */
@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}

.skeleton-active {
  background: linear-gradient(90deg,
    var(--surface) 25%,
    rgba(255,255,255,0.04) 50%,
    var(--surface) 75%
  ) !important;
  background-size: 800px 100% !important;
  animation: shimmer 1.4s ease-in-out infinite !important;
  color: transparent !important;
  border-color: transparent !important;
  border-radius: 2px;
  pointer-events: none;
  user-select: none;
}

/* ─── Page nav ─────────────────────────────────────────────────────── */
.page-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  background: rgba(7,7,6,0.92);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.member-badge {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  color: var(--goldA);
  border: 1px solid var(--goldBorderS);
  padding: 5px 12px;
}

/* ─── Page layout ──────────────────────────────────────────────────── */
.page-content {
  max-width: calc(var(--content-max) + var(--pad-x) * 2);
  margin: 0 auto;
  padding: 120px var(--pad-x) 100px;
}

/* ─── Page header ──────────────────────────────────────────────────── */
.page-header { margin-bottom: 56px; }

.page-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.28em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.page-title {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: clamp(32px, 5vw, 52px);
  letter-spacing: 0.04em;
  line-height: 1.1;
  margin-bottom: 10px;
}

.page-subtitle {
  font-family: var(--font-display);
  font-size: 17px;
  color: var(--muted);
  line-height: 1.7;
}

/* ─── Bridge inactive / empty states ──────────────────────────────── */
.bridge-state {
  border: 1px solid var(--border);
  padding: 48px;
  text-align: center;
  margin-bottom: 48px;
}

.bridge-state-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.28em;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.bridge-state-headline {
  font-family: var(--font-display);
  font-size: 28px;
  font-style: italic;
  font-weight: 300;
  color: var(--text);
  margin-bottom: 14px;
}

.bridge-state-sub {
  font-family: var(--font-ui);
  font-size: 14px;
  color: var(--muted);
  line-height: 1.7;
  max-width: 480px;
  margin: 0 auto;
}

.bridge-pending-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  margin-top: 32px;
}

/* ─── Deal card grid ───────────────────────────────────────────────── */
.deal-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 48px;
}

/* ─── Deal card ────────────────────────────────────────────────────── */
.deal-card {
  background: var(--surface);
  padding: 24px;
  transition: border-color 220ms ease;
  border: 1px solid transparent;
  position: relative;
}

.deal-card:hover {
  border-color: var(--goldBorderS);
  z-index: 1;
}

/* ─── Skeleton deal card ───────────────────────────────────────────── */
.deal-card-skeleton {
  background: var(--surface);
  padding: 24px;
}

.skel-line {
  height: 10px;
  margin-bottom: 12px;
  border-radius: 2px;
}

.skel-line--sm  { width: 40%; }
.skel-line--md  { width: 65%; }
.skel-line--lg  { width: 85%; }
.skel-line--xl  { width: 100%; }
.skel-line--title { height: 20px; width: 80%; margin-bottom: 8px; }

/* ─── Deal card meta row ───────────────────────────────────────────── */
.deal-meta-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}

/* ─── Stage pill ───────────────────────────────────────────────────── */
.deal-stage-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border: 1px solid;
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.deal-stage-pill--review  { color: var(--muted); border-color: var(--border); }
.deal-stage-pill--live    { color: var(--amber); border-color: var(--amberBd); }
.deal-stage-pill--dd      { color: var(--amber); border-color: var(--amberBd); }
.deal-stage-pill--terms   { color: var(--amber); border-color: var(--amberBd); }
.deal-stage-pill--close   { color: var(--green); border-color: var(--greenBd); }
.deal-stage-pill--realized { color: var(--goldA); border-color: var(--goldBorderS); }
.deal-stage-pill--killed  { color: var(--dim); border-color: var(--border); }

/* ─── Type badge ───────────────────────────────────────────────────── */
.deal-type-badge {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
}

/* ─── Deal name ────────────────────────────────────────────────────── */
.deal-name {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 300;
  color: var(--text);
  margin: 12px 0 6px;
  line-height: 1.3;
}

/* ─── Geography/vintage line ───────────────────────────────────────── */
.deal-geo {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--dim);
  text-transform: uppercase;
}

/* ─── Status note ──────────────────────────────────────────────────── */
.deal-note {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--muted);
  line-height: 1.6;
  margin-top: 12px;
}

/* ─── Updated date ─────────────────────────────────────────────────── */
.deal-updated {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  color: var(--dim);
  text-transform: uppercase;
  margin-top: 16px;
}

/* ─── Mobile bottom nav ─────────────────────────────────────────────── */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--near);
  border-top: 1px solid var(--border);
  padding: 10px 24px max(10px, env(safe-area-inset-bottom));
  justify-content: space-around;
  align-items: center;
  height: 56px;
}

.mobile-nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  text-decoration: none;
  color: var(--muted);
  transition: color 180ms ease;
  min-width: 48px;
}

.mobile-nav-item.active { color: var(--goldA); }
.mobile-nav-icon { font-size: 18px; line-height: 1; }
.mobile-nav-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border-bottom: 1px solid transparent;
}

.mobile-nav-item.active .mobile-nav-label { border-bottom-color: var(--goldA); }

/* ─── Responsive ───────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .page-content { padding: 100px 20px 120px; }
  .page-nav { padding: 16px 20px; }
  .mobile-nav { display: flex; }
  .deal-grid { grid-template-columns: 1fr; }
  .bridge-state { padding: 36px 24px; }
}

@media (max-width: 430px) {
  .page-nav { padding: 14px 16px; }
  .member-badge { font-size: 10px; padding: 4px 8px; }
  .page-title { font-size: clamp(26px, 7vw, 36px); }
  .deal-meta-row { gap: 6px; }
}

@media (max-width: 375px) {
  .page-content { padding: 96px 16px 120px; }
  .deal-name { font-size: 18px; }
}

/* ─── Bilingual ────────────────────────────────────────────────────── */
[data-lang]{display:none}
.lang-en [data-lang="en"],.lang-en [data-lang="en"].block{display:inline}.lang-en [data-lang="en"].block{display:block}
.lang-ko [data-lang="ko"],.lang-ko [data-lang="ko"].block{display:inline}.lang-ko [data-lang="ko"].block{display:block}
</style>
</head>
<body>

<div class="page-veil" id="page-veil"></div>

<nav class="page-nav" role="navigation">
  <a href="/portfolio" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
    <div class="seal"><em>Au</em></div>
    <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;">
      <span data-lang="en">Positions</span><span data-lang="ko">포지션</span>
    </span>
  </a>
  <div style="display:flex;align-items:center;gap:10px;">
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ko')">한국어</button>
    <span class="member-badge" id="member-badge">#—</span>
  </div>
</nav>

<main class="page-content">

  <header class="page-header" data-reveal>
    <p class="page-eyebrow">
      <span data-lang="en">Fund Deployment</span><span data-lang="ko">펀드 운용</span>
    </p>
    <h1 class="page-title">
      <span data-lang="en">Current <em class="gold-gradient">Positions</em></span>
      <span data-lang="ko">현재 <em class="gold-gradient">포지션</em></span>
    </h1>
    <p class="page-subtitle">
      <span data-lang="en">What your fund is doing with your capital.</span>
      <span data-lang="ko">펀드가 귀하의 자본으로 어떤 일을 하고 있는지 보여줍니다.</span>
    </p>
  </header>

  <!-- Deals container — populated by JS -->
  <div id="deals-container" data-reveal data-delay="100"></div>

</main>

<!-- Mobile bottom nav -->
<nav class="mobile-nav" aria-label="Mobile navigation">
  <a href="/portfolio" class="mobile-nav-item">
    <span class="mobile-nav-icon">⌂</span>
    <span class="mobile-nav-label"><span data-lang="en">Overview</span><span data-lang="ko">개요</span></span>
  </a>
  <a href="/gold" class="mobile-nav-item">
    <span class="mobile-nav-icon">◈</span>
    <span class="mobile-nav-label"><span data-lang="en">Gold</span><span data-lang="ko">금</span></span>
  </a>
  <a href="/documents" class="mobile-nav-item">
    <span class="mobile-nav-icon">⊟</span>
    <span class="mobile-nav-label"><span data-lang="en">Documents</span><span data-lang="ko">문서</span></span>
  </a>
  <a href="/messages" class="mobile-nav-item">
    <span class="mobile-nav-icon">✉</span>
    <span class="mobile-nav-label"><span data-lang="en">Messages</span><span data-lang="ko">메시지</span></span>
  </a>
</nav>

<script src="/_scripts/shared.js"></script>
<script>
(function () {
  'use strict';

  /* ─── Stage config ──────────────────────────────────────────────── */
  var STAGE_CONFIG = {
    review:   { cls: 'deal-stage-pill--review',   en: 'Review',     ko: '검토 중' },
    live:     { cls: 'deal-stage-pill--live',     en: 'Live',       ko: '진행 중' },
    dd:       { cls: 'deal-stage-pill--dd',       en: 'DD',         ko: '실사 중' },
    terms:    { cls: 'deal-stage-pill--terms',    en: 'Terms',      ko: '협상 중' },
    close:    { cls: 'deal-stage-pill--close',    en: 'Close',      ko: '마감' },
    realized: { cls: 'deal-stage-pill--realized', en: 'Realized',   ko: '실현' },
    killed:   { cls: 'deal-stage-pill--killed',   en: 'Closed',     ko: '종료' }
  };

  var TYPE_LABELS = {
    credit: 'Credit',
    equity: 'Equity',
    hybrid: 'Hybrid'
  };

  /* ─── Member badge ──────────────────────────────────────────────── */
  fetch('/api/v2?resource=member&op=me', { credentials: 'same-origin' })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      var badge = document.getElementById('member-badge');
      if (badge && d.member_number) badge.textContent = '#' + d.member_number;
    })
    .catch(function () {});

  /* ─── Date formatter ────────────────────────────────────────────── */
  function formatDate(iso) {
    if (!iso) return '—';
    try {
      var d = new Date(iso);
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return d.getFullYear() + ' ' + months[d.getMonth()] + ' ' + String(d.getDate()).padStart(2, '0');
    } catch (e) {
      return iso.slice(0, 10);
    }
  }

  /* ─── HTML escape ───────────────────────────────────────────────── */
  function esc(s) {
    if (!s) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ─── Render skeleton ───────────────────────────────────────────── */
  function renderSkeleton(container) {
    var grid = document.createElement('div');
    grid.className = 'deal-grid';
    grid.setAttribute('aria-busy', 'true');
    grid.setAttribute('aria-label', 'Loading fund positions');

    for (var i = 0; i < 2; i++) {
      var card = document.createElement('div');
      card.className = 'deal-card-skeleton';
      card.innerHTML =
        '<div class="skel-line skel-line--sm skeleton-active"></div>' +
        '<div class="skel-line skel-line--title skeleton-active"></div>' +
        '<div class="skel-line skel-line--md skeleton-active"></div>' +
        '<div class="skel-line skel-line--xl skeleton-active" style="margin-top:16px;height:40px;"></div>' +
        '<div class="skel-line skel-line--lg skeleton-active" style="margin-top:16px;"></div>';
      grid.appendChild(card);
    }
    container.appendChild(grid);
  }

  /* ─── Render bridge-inactive state ─────────────────────────────── */
  function renderBridgeInactive(container) {
    var el = document.createElement('div');
    el.className = 'bridge-state';
    el.innerHTML =
      '<p class="bridge-state-eyebrow">' +
        '<span data-lang="en">Fund Positions</span>' +
        '<span data-lang="ko">펀드 포지션</span>' +
      '</p>' +
      '<h2 class="bridge-state-headline">' +
        '<span data-lang="en">Fund positions will appear here</span>' +
        '<span data-lang="ko">펀드 포지션이 여기에 표시됩니다</span>' +
      '</h2>' +
      '<p class="bridge-state-sub">' +
        '<span data-lang="en">When the fund deploys capital, your portfolio positions will be visible in this section.</span>' +
        '<span data-lang="ko">펀드가 자본을 운용하기 시작하면, 귀하의 포트폴리오 포지션이 이 섹션에 표시됩니다.</span>' +
      '</p>' +
      '<p class="bridge-pending-badge">PRISM BRIDGE &middot; PENDING ACTIVATION</p>';
    container.appendChild(el);
    syncLang(container);
  }

  /* ─── Render empty-positions state ─────────────────────────────── */
  function renderEmpty(container) {
    var el = document.createElement('div');
    el.className = 'bridge-state';
    el.innerHTML =
      '<p class="bridge-state-eyebrow">' +
        '<span data-lang="en">Fund Positions</span>' +
        '<span data-lang="ko">펀드 포지션</span>' +
      '</p>' +
      '<h2 class="bridge-state-headline">' +
        '<span data-lang="en">No active positions</span>' +
        '<span data-lang="ko">활성 포지션 없음</span>' +
      '</h2>' +
      '<p class="bridge-state-sub">' +
        '<span data-lang="en">No capital has been deployed into deal positions at this time.</span>' +
        '<span data-lang="ko">현재 딜 포지션에 운용된 자본이 없습니다.</span>' +
      '</p>';
    container.appendChild(el);
    syncLang(container);
  }

  /* ─── Render error state ────────────────────────────────────────── */
  function renderError(container) {
    var el = document.createElement('div');
    el.className = 'bridge-state';
    el.innerHTML =
      '<p class="bridge-state-eyebrow">' +
        '<span data-lang="en">Fund Positions</span>' +
        '<span data-lang="ko">펀드 포지션</span>' +
      '</p>' +
      '<h2 class="bridge-state-headline">' +
        '<span data-lang="en">Feed temporarily unavailable</span>' +
        '<span data-lang="ko">피드를 일시적으로 사용할 수 없음</span>' +
      '</h2>' +
      '<p class="bridge-state-sub">' +
        '<span data-lang="en">Position data could not be retrieved at this time. Please check back shortly.</span>' +
        '<span data-lang="ko">현재 포지션 데이터를 불러올 수 없습니다. 잠시 후 다시 확인해 주세요.</span>' +
      '</p>';
    container.appendChild(el);
    syncLang(container);
  }

  /* ─── Render deal card ──────────────────────────────────────────── */
  function buildDealCard(deal) {
    var stage = deal.stage || 'review';
    var stageConf = STAGE_CONFIG[stage] || STAGE_CONFIG['review'];
    var typeLabel = TYPE_LABELS[deal.type] || (deal.type ? deal.type.toUpperCase() : '');

    var card = document.createElement('div');
    card.className = 'deal-card';

    card.innerHTML =
      '<div class="deal-meta-row">' +
        '<span class="deal-stage-pill ' + stageConf.cls + '">' +
          '<span data-lang="en">' + esc(stageConf.en) + '</span>' +
          '<span data-lang="ko">' + esc(stageConf.ko) + '</span>' +
        '</span>' +
        (typeLabel ? '<span class="deal-type-badge">' + esc(typeLabel) + '</span>' : '') +
      '</div>' +
      '<div class="deal-name">' + esc(deal.name || '—') + '</div>' +
      (deal.geography || deal.vintage
        ? '<div class="deal-geo">' +
            [deal.geography, deal.vintage].filter(Boolean).map(esc).join(' &middot; ') +
          '</div>'
        : '') +
      (deal.status_note
        ? '<p class="deal-note">' + esc(deal.status_note) + '</p>'
        : '') +
      (deal.updated_at
        ? '<p class="deal-updated">UPDATED ' + esc(formatDate(deal.updated_at)) + '</p>'
        : '');

    return card;
  }

  /* ─── Render deal grid ──────────────────────────────────────────── */
  function renderDeals(container, deals) {
    var grid = document.createElement('div');
    grid.className = 'deal-grid';

    deals.forEach(function (deal) {
      grid.appendChild(buildDealCard(deal));
    });

    container.appendChild(grid);
    syncLang(container);
  }

  /* ─── Sync bilingual visibility to current lang ─────────────────── */
  function syncLang(root) {
    var lang = document.documentElement.lang || 'ko';
    // The shared.js setLang function handles body class.
    // Just trigger a re-apply by dispatching a custom event.
    // lang system is class-based on body — no action needed if body already has the class.
    // This function is a no-op placeholder; body class drives visibility.
  }

  /* ─── Main fetch ────────────────────────────────────────────────── */
  var container = document.getElementById('deals-container');

  // Show skeleton immediately
  renderSkeleton(container);

  fetch('/api/v2?resource=member&op=deals', { credentials: 'same-origin' })
    .then(function (r) {
      if (!r.ok) throw new Error('http_' + r.status);
      return r.json();
    })
    .then(function (data) {
      // Clear skeleton
      container.innerHTML = '';

      if (!data.ok) {
        renderError(container);
        return;
      }

      if (data.error === 'feed_unavailable') {
        renderError(container);
        return;
      }

      if (!data.bridge_active) {
        renderBridgeInactive(container);
        return;
      }

      var deals = Array.isArray(data.deals) ? data.deals : [];

      if (deals.length === 0) {
        renderEmpty(container);
        return;
      }

      renderDeals(container, deals);
    })
    .catch(function () {
      container.innerHTML = '';
      renderError(container);
    });

}());
</script>
</body>
</html>

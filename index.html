<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<meta name="theme-color" content="#070706">
<title>The Aurum Century Club</title>
<meta name="description" content="Singapore private fund. By invitation only.">
<meta name="robots" content="noindex, nofollow">
<meta property="og:title" content="The Aurum Century Club">
<meta property="og:description" content="Singapore private fund. By invitation only.">
<meta property="og:type" content="website">
<link rel="canonical" href="https://www.theaurumcc.com/">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%23070706'/><rect x='4' y='4' width='24' height='24' fill='none' stroke='%23C5A572' stroke-width='1'/><text x='16' y='22' text-anchor='middle' font-family='Georgia,serif' font-size='14' font-style='italic' fill='%23C5A572'>Au</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/_styles/tokens.css">

<style>
/* ── Public gate ──────────────────────────────────────────────────────
   No pitch content. No scroll. Visitor either knows about Aurum and
   requests an invitation, or leaves. Pitch lives at /main (gated).
   ─────────────────────────────────────────────────────────────────── */

html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--near, #070706);
  color: var(--text, #ece6da);
  font-family: var(--font-ui, 'DM Sans', system-ui, sans-serif);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* Ambient mouse-follow spotlight */
.spotlight {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(
    ellipse 800px 600px at var(--mx, 50%) var(--my, 50%),
    rgba(197, 165, 114, 0.08),
    transparent 60%
  );
  z-index: 1;
  transition: background 200ms ease;
}

/* Nav — minimal */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 32px;
  background: linear-gradient(180deg, rgba(7,7,6,0.85), rgba(7,7,6,0));
}
.nav-lockup {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: inherit;
}
.nav-seal {
  width: 30px;
  height: 30px;
  border: 1px solid var(--goldA, #C5A572);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-style: italic;
  color: var(--goldA, #C5A572);
  font-size: 14px;
  letter-spacing: -0.04em;
}
.nav-text {
  display: flex;
  flex-direction: column;
  line-height: 1;
  gap: 4px;
}
.nav-text .word {
  font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
  font-size: 11px;
  letter-spacing: 0.30em;
  color: var(--text, #ece6da);
  text-transform: uppercase;
}
.nav-text .program {
  font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
  font-size: 8px;
  letter-spacing: 0.32em;
  color: var(--goldD, #8a7d6b);
  text-transform: uppercase;
}
.nav-members {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text, #ece6da);
  font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  padding: 8px 14px;
  border: 1px solid var(--goldBorderS, rgba(197,165,114,0.50));
  transition: background 200ms ease, border-color 200ms ease;
}
.nav-members:hover {
  background: var(--goldWash, rgba(197,165,114,0.06));
  border-color: var(--goldA, #C5A572);
  color: var(--goldA, #C5A572);
}
.nav-members .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--goldA, #C5A572);
}

/* Landing — the door */
.landing {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
}
.landing::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(
    ellipse 700px 500px at 50% 45%,
    rgba(197, 165, 114, 0.045),
    transparent 65%
  );
  pointer-events: none;
  animation: doorBreathe 9s ease-in-out infinite;
}
@keyframes doorBreathe {
  0%, 100% { opacity: 0.7; }
  50%      { opacity: 1; }
}

.door {
  position: relative;
  z-index: 3;
  text-align: center;
  max-width: 520px;
  animation: doorEnter 1200ms cubic-bezier(0.22, 1, 0.36, 1) both;
}
@keyframes doorEnter {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.door-seal {
  width: 64px;
  height: 64px;
  margin: 0 auto 36px;
  border: 1px solid var(--goldBorderS, rgba(197,165,114,0.50));
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-style: italic;
  font-size: 26px;
  color: var(--goldA, #C5A572);
  letter-spacing: -0.04em;
  transition: box-shadow 400ms ease, border-color 400ms ease;
}
.door:hover .door-seal {
  box-shadow: 0 0 28px rgba(197,165,114,0.15);
  border-color: var(--goldA, #C5A572);
}

.door-wordmark {
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-weight: 300;
  font-size: clamp(34px, 6vw, 52px);
  letter-spacing: 0.02em;
  line-height: 1.05;
  color: var(--text, #ece6da);
  margin-bottom: 24px;
}
.door-wordmark em {
  font-style: italic;
  color: var(--goldC, #F0CF9A);
}

.door-rule {
  width: 32px;
  height: 1px;
  background: var(--goldBorderS, rgba(197,165,114,0.50));
  margin: 0 auto 24px;
}

.door-tag {
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-size: 16px;
  font-weight: 300;
  color: var(--muted, #a89f94);
  margin-bottom: 36px;
  line-height: 1.6;
}
.door-tag em {
  font-style: italic;
  color: var(--goldC, #F0CF9A);
}

.door-status {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
  font-size: 9.5px;
  letter-spacing: 0.32em;
  color: var(--goldD, #8a7d6b);
  text-transform: uppercase;
  margin-bottom: 40px;
}
.door-status .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--goldA, #C5A572);
  animation: statusPulse 2.4s ease-in-out infinite;
}
@keyframes statusPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(197,165,114,0.5); }
  70%      { box-shadow: 0 0 0 8px rgba(197,165,114,0); }
}

.door-cta {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  padding: 16px 32px;
  background: var(--goldA, #C5A572);
  color: var(--near, #070706);
  font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.30em;
  text-transform: uppercase;
  transition: background 200ms ease, transform 200ms ease, box-shadow 200ms ease;
  border: 1px solid var(--goldA, #C5A572);
}
.door-cta:hover {
  background: var(--goldB, #DEB97A);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(197,165,114,0.32);
}
.door-cta .arrow {
  font-family: var(--font-display, 'Cormorant Garamond', serif);
  font-style: italic;
  font-size: 18px;
  letter-spacing: 0;
}

/* Footer */
.foot {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 18px 32px;
  font-family: var(--font-mono, 'JetBrains Mono', ui-monospace, monospace);
  font-size: 9px;
  letter-spacing: 0.24em;
  color: var(--muted, #6b655e);
  text-transform: uppercase;
  background: linear-gradient(0deg, rgba(7,7,6,0.9), rgba(7,7,6,0));
}
.foot a { color: inherit; text-decoration: none; }
.foot .sep { margin: 0 8px; opacity: 0.5; }
.foot-r { text-align: right; }

/* Mobile */
@media (max-width: 640px) {
  .nav { padding: 16px 20px; }
  .nav-text .word { font-size: 9px; }
  .nav-text .program { font-size: 7px; }
  .nav-members { padding: 6px 10px; font-size: 9px; letter-spacing: 0.18em; }
  .door-wordmark { font-size: clamp(28px, 8vw, 38px); }
  .door-tag { font-size: 14px; }
  .door-cta { padding: 14px 24px; font-size: 10px; letter-spacing: 0.24em; }
  .foot {
    flex-direction: column;
    gap: 6px;
    padding: 14px 16px;
    font-size: 8px;
    letter-spacing: 0.18em;
  }
  .foot-r { text-align: center; }
}

@media (max-width: 380px) {
  .door-wordmark { font-size: 26px; }
  .door-tag { font-size: 13px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .door, .landing::before, .door-status .dot { animation: none; }
}
</style>
</head>
<body>

<div class="spotlight" id="spotlight"></div>

<nav class="nav">
  <a href="/" class="nav-lockup" aria-label="Aurum Century Club">
    <span class="nav-seal"><em>Au</em></span>
    <span class="nav-text">
      <span class="word">Aurum</span>
      <span class="program">Century · Club</span>
    </span>
  </a>
  <a href="/login" class="nav-members" aria-label="Member sign-in">
    <span class="dot"></span>
    <span>Members</span>
  </a>
</nav>

<section class="landing">
  <div class="door">
    <div class="door-seal"><em>Au</em></div>
    <h1 class="door-wordmark">The Aurum<br><em>Century Club</em></h1>
    <div class="door-rule"></div>
    <p class="door-tag">Singapore private fund. <em>By invitation only.</em></p>
    <div class="door-status">
      <span class="dot"></span>
      <span>Founding Cohort · Q3 2026</span>
    </div>
    <br>
    <a href="/interest" class="door-cta">
      <span>Request Invitation</span>
      <span class="arrow">→</span>
    </a>
  </div>
</section>

<footer class="foot">
  <div class="foot-l">TACC PTE LTD · MMXXVI</div>
  <div class="foot-c">
    <a href="https://www.theaurumcc.com">theaurumcc.com</a>
    <span class="sep">·</span>
    <span>Singapore</span>
  </div>
  <div class="foot-r">CONFIDENTIAL · QUALIFIED INVESTORS ONLY · NOT AN OFFER OR SOLICITATION</div>
</footer>

<script>
// Mouse-follow spotlight (respects reduced-motion).
(function () {
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var spot = document.getElementById('spotlight');
  if (!spot) return;
  document.addEventListener('mousemove', function (e) {
    spot.style.setProperty('--mx', (e.clientX / window.innerWidth * 100) + '%');
    spot.style.setProperty('--my', (e.clientY / window.innerHeight * 100) + '%');
  }, { passive: true });
}());
</script>
</body>
</html>
